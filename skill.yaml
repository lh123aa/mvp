# Skill 定义配置文件
# 需求挖掘与最小商业闭环系统

name: demand-miner
version: 1.0.0
description: 陌生领域需求痛点挖掘与最小商业闭环落地全适配系统

# 触发关键词
trigger_keywords:
  - 产品分析
  - 项目分析
  - 商业分析
  - 商业闭环
  - 需求挖掘
  - 商业模式
  - 创业分析
  - 副业规划

# 核心功能
capabilities:
  - 用户画像构建
  - 目标用户分析
  - 痛点挖掘
  - 解决方案匹配
  - 商业闭环设计
  - 验证指标制定

# 元信息
metadata:
  作者: Sisyphus Agent
  创建日期: 2026-03-09
  用途: 帮助用户从陌生领域探索到最小商业闭环落地
  适用场景:
    - 副业试水
    - 创业立项
    - 行业研究
    - 职业转型

# 输入接口
input:
  类型: 文本
  触发方式:
    - 关键词触发
  关键词:
    - 产品分析
    - 项目分析
    - 商业分析
    - 商业闭环
    - 需求挖掘
    - 商业模式
    - 创业分析
    - 副业规划

# 输出接口
output:
  类型: 结构化文本
  格式: Markdown

# 约束规则
constraints:
  优先级: 用户约束 > 固定流程
  刚性规则:
    - 成本预算约束: 过滤所有超出预算的方案
    - 周期约束: 过滤所有超出周期的方案
    - 核心目标: 仅输出与目标相关的内容

# 关联文件
files:
  主文档: SKILL.md
  辅助脚本: scripts/
  资源数据: resources/
  数据存储: data/