# Skill 定义配置文件
# 需求挖掘与最小商业闭环系统

name: demand-miner
version: 0.1.0
description: 陌生领域需求痛点挖掘与最小商业闭环落地全适配系统
trigger_keywords:
  - "产品分析"
  - "项目分析"
  - "商业分析"
  - "商业闭环"
  - "需求挖掘"
  - "商业模式"
  - "创业分析"
  - "副业规划"

# 技能元信息
metadata:
  作者: Sisyphus Agent
  创建日期: 2026-03-09
  用途: 帮助用户从陌生领域探索到最小商业闭环落地
  适用场景: 
    - 副业试水
    - 创业立项
    - 行业研究
    - 职业转型

# 输入接口
input:
  类型: 对话式
  启动条件:
    - 用户首次启动：需要完整的4问题前置对齐
    - 用户返回继续：需要 session_id
    - 用户中途切换：需要 session_id + 切换指令
  触发方式:
    - 关键词触发："产品分析", "项目分析", "商业分析", "商业闭环", "需求挖掘", "商业模式", "创业分析", "副业规划"
    - 直接触发：demand-miner
  
  初始问题序列:
    - 问题1: 你本次想要拆解分析的核心目标，是具体的职业、某类商业赛道，还是一款特定的产品？
    - 问题2: 你本次做需求挖掘与最小闭环设计的核心目标是什么？
    - 问题3: 你对这个目标领域，目前的认知程度符合哪一种？
    - 问题4: 你希望最小商业闭环的落地周期与可投入的成本预算上限是？

# 输出接口
output:
  类型: 对话式 + 结构化数据
  
  正常输出:
    - 阶段状态提示
    - 单问题（每次仅1个）
    - 选项列表（带约束过滤）
    - 完整方案（最终环节）
  
  元数据:
    - session_id: 唯一会话标识
    - 当前阶段: 前置对齐/认知补齐/用户锁定/痛点拆解/方案匹配/闭环设计/最终输出
    - 预估剩余轮次: 数字
    - 进度百分比: 0-100

# 状态管理
state:
  存储方式: 内存 + JSON持久化
  状态结构:
    user_profile:
      - 核心目标: string
      - 核心目的: string (副业试水/创业立项/行业研究学习/职业转型规划/其他)
      - 认知层级: string (完全陌生/有基础认知/资深从业者)
      - 预算约束: string
      - 周期约束: string
      - 服务模式: string (引导教练/落地顾问/深度共创)
    
    current_state:
      - 阶段: string
      - 环节: string
      - 子环节索引: number
      - 已收集信息: object
    
    history:
      - 环节: string
      - 问题: string
      - 用户回答: string
      - AI输出: string
      - 用户反馈: string (满意/需调整/不满意)

# 数据存储
storage:
  方式: JSON文件
  位置: ./data/
  结构:
    sessions/: 对话记录 (每次对话一个JSON)
    reviews/: 复盘小结 (每次对话结束生成)
    stats/: 统计报告 (周/月汇总)

# 核心约束（必须遵守）
constraints:
  优先级: 用户约束 > 固定流程 > 固定提问 > 固定模板
  
  刚性规则:
    - 成本预算约束: 过滤所有超出预算的方案/选项
    - 周期约束: 过滤所有超出周期的方案/选项
    - 核心目标: 仅输出与目标相关的内容
  
  交互规则:
    - 单问题递进: 每次仅抛出1个问题
    - 容错机制: 用户连续2次"不知道"则直接输出结论
    - 模式切换: 用户可随时要求切换服务模式

# 模块列表
modules:
  - name: 前置对齐
    file: modules/pre_alignment.py
    职责: 4个单问题的顺序询问与用户画像构建
  
  - name: 陌生模式
    file: modules/stranger_mode.py
    职责: 完全陌生用户的完整对话流程（落地顾问角色）
  
  - name: 基础模式
    file: modules/basic_mode.py
    职责: 有基础认知用户的对话流程（引导教练/落地顾问）
  
  - name: 资深模式
    file: modules/senior_mode.py
    职责: 资深从业者的深度共创流程
  
  - name: 状态管理
    file: utils/state_manager.py
    职责: 会话状态创建、读取、更新、持久化
  
  - name: 约束过滤
    file: utils/constraint_filter.py
    职责: 根据预算/周期/目标过滤选项
  
  - name: 对话记录
    file: modules/dialogue_recorder.py
    职责: 自动保存对话过程为JSON
  
  - name: 自动复盘
    file: modules/auto_reviewer.py
    职责: 对话结束生成复盘小结
  
    file: modules/stats_generator.py
    职责: 周/月统计报告生成
  
  - name: 知识库
    职责: 行业方案库、案例库管理
  
  - name: A/B测试
    file: modules/ab_tester.py
    职责: A/B版本测试管理
  
  - name: 用户反馈
    file: modules/feedback_collector.py
    职责: 用户落地结果追踪

# 迭代配置
iteration:
    职责: 行业方案库、案例库管理

# 迭代配置
    file: modules/stats_generator.py
    职责: 周/月统计报告生成

# 迭代配置
iteration:
  复盘时机: 每次对话结束
  记录内容:
    - 用户画像
    - 路径轨迹
    - 交互质量
    - 输出质量
    - 异常记录
  优化触发:
    - 问题"不知道"率 > 40%
    - 环节流失率 > 30%
    - 连续满意度下降3次
